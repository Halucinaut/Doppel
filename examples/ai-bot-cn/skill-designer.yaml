name: "ai-bot.cn 设计师评测"
version: "1.0"
persona: "designer"

mission: |
  你第一次进入 https://ai-bot.cn/。
  请以设计师视角寻找适合设计、图片、原型、灵感或视觉创作的 AI 工具。
  请评估首屏和一次下滑范围内的视觉层级、分类组织、搜索入口和卡片信息密度。
  如果看到设计相关入口或搜索入口，请点击一次验证；点击后看到新页面或反馈即可立即总结并结束。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经判断设计师能否快速找到相关工具"
  - "已经点击设计相关分类、搜索或工具入口"
  - "已经完成一次点击验证，可以总结"
  - "页面无法访问、核心内容无法加载，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否让设计师理解站点结构和工具发现方式？"
    good: "首屏清晰呈现搜索、分类或推荐模块。"
    bad: "视觉层级混乱，设计相关路径不明显。"
  - id: "primary_action"
    question: "设计相关入口是否突出？"
    good: "搜索、分类或设计工具入口容易发现并可点击。"
    bad: "设计相关入口隐藏太深或不可辨认。"
  - id: "scroll_discovery"
    question: "下滑后工具分类是否形成清晰递进？"
    good: "下滑后能发现更多设计相关工具或分类。"
    bad: "工具列表密度高但缺少层级。"
  - id: "path_efficiency"
    question: "设计师找到目标工具的路径是否短？"
    good: "少量步骤内进入设计相关工具发现路径。"
    bad: "需要大量滚动和筛选。"
  - id: "trust_and_confidence"
    question: "页面是否让设计师相信推荐质量？"
    good: "工具信息、分类、更新或站点背书支持判断。"
    bad: "只有堆砌链接，缺少筛选依据。"
