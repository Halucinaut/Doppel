name: "ai-bot.cn 谨慎用户评测"
version: "1.0"
persona: "privacy_cautious"

mission: |
  你第一次进入 https://ai-bot.cn/。
  请以谨慎用户视角判断这个 AI 工具导航站是否可信，点击工具或外链前是否能看到足够说明、来源、更新或站点背书。
  只观察首屏和一次下滑范围内的内容。
  如果看到站点说明、分类、工具详情或外链入口，请点击一个最能验证可信度的入口；点击后看到新页面或反馈即可立即总结并结束。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经找到足够信任信号，可以判断是否继续"
  - "已经点击可信度相关入口并观察反馈"
  - "已经完成一次点击验证，可以总结"
  - "页面缺少可信信息，无法建立继续使用信心"
  - "页面无法访问、核心内容无法加载，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否清楚说明站点用途，避免谨慎用户困惑？"
    good: "首屏明确说明站点定位和工具发现方式。"
    bad: "首屏像广告集合或链接墙。"
  - id: "primary_action"
    question: "主要入口是否让用户知道会跳向哪里？"
    good: "搜索、分类或工具详情入口清晰。"
    bad: "入口含糊，外链风险不可预期。"
  - id: "scroll_discovery"
    question: "下滑后是否发现可信依据？"
    good: "出现分类解释、更新、站点说明、工具详情或来源信息。"
    bad: "只有重复卡片和外链。"
  - id: "path_efficiency"
    question: "谨慎用户建立信任的路径是否高效？"
    good: "少量步骤内看到可信依据。"
    bad: "可信信息隐藏太深或不可见。"
  - id: "trust_and_confidence"
    question: "站点是否提供足够信任信号？"
    good: "出现品牌、说明、更新、分类质量、工具详情或用户反馈。"
    bad: "缺少可信来源和风险提示。"
