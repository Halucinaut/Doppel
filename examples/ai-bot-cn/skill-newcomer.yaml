name: "ai-bot.cn 新手发现评测"
version: "1.0"
persona: "newcomer"

mission: |
  你第一次进入 https://ai-bot.cn/。
  请像 AI 工具新手一样判断这个站点是做什么的、怎么找工具、是否有明确搜索或分类入口。
  只需要观察首屏和一次下滑范围内的内容。
  如果看到搜索、分类、热门工具或推荐入口，请点击一个最像主路径的入口验证；点击后看到新页面或弹层即可立即总结并结束。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经理解站点用途和主要使用路径"
  - "已经找到并验证搜索、分类或推荐入口"
  - "已经完成一次点击验证，可以总结"
  - "页面无法访问、核心内容无法加载，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否能让 AI 工具新手理解站点用途？"
    good: "首屏直接说明 AI 工具导航、搜索或分类能力。"
    bad: "首屏内容杂乱或广告化，新手不知道如何开始。"
  - id: "primary_action"
    question: "是否存在明确的搜索、分类或工具发现入口？"
    good: "用户能快速找到搜索框、分类导航或热门工具入口。"
    bad: "入口分散或弱，用户不知道点哪里。"
  - id: "scroll_discovery"
    question: "下滑后是否出现有效信息递进？"
    good: "下滑后看到分类、工具列表、榜单或站点说明。"
    bad: "下滑后内容重复或无法提升理解。"
  - id: "path_efficiency"
    question: "新手找到工具入口的路径是否高效？"
    good: "少量步骤内理解站点并进入工具发现路径。"
    bad: "需要反复滚动、等待或猜测。"
  - id: "trust_and_confidence"
    question: "站点是否提供足够信任信号？"
    good: "能看到品牌、更新、分类质量、说明或用户反馈。"
    bad: "缺少可信来源和站点说明。"
