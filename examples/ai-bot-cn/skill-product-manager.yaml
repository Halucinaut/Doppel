name: "ai-bot.cn 产品经理评测"
version: "1.0"
persona: "product_manager"

mission: |
  你第一次进入 https://ai-bot.cn/。
  请以产品经理视角评估工具发现路径：站点是否能快速帮助用户从首页进入搜索、分类、热门工具或具体工具详情。
  只评估首屏和一次下滑范围内的信息架构。
  如果看到明显入口，请点击一个最可能代表主路径的入口，并判断跳转反馈；点击后看到新页面或反馈即可立即总结并结束。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经识别首页到工具发现或工具详情的主路径"
  - "已经点击并观察主入口跳转反馈"
  - "已经完成一次点击验证，可以总结"
  - "路径断裂、页面无法访问，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否说明站点价值和主路径？"
    good: "用户能立即理解这是 AI 工具导航，并知道通过搜索或分类开始。"
    bad: "首屏信息分散，无法形成主路径判断。"
  - id: "primary_action"
    question: "主要发现入口是否清晰？"
    good: "搜索、分类、热门工具或推荐入口明显且反馈明确。"
    bad: "入口多但优先级不清。"
  - id: "scroll_discovery"
    question: "页面信息是否按发现路径递进？"
    good: "从定位到分类、榜单、工具卡片形成连续路径。"
    bad: "内容堆叠，用户难以筛选。"
  - id: "path_efficiency"
    question: "从进入到找到可用工具的路径是否高效？"
    good: "10 步内完成理解、发现入口和跳转验证。"
    bad: "存在大量等待、重复滚动或无效点击。"
  - id: "trust_and_confidence"
    question: "站点是否提供足够可信信息支持继续使用？"
    good: "分类、更新、站点说明、工具信息或品牌信号充分。"
    bad: "缺少可信依据，像无筛选链接集合。"
