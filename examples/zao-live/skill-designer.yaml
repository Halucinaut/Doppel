name: "zao.live 视觉设计评测"
version: "1.0"
persona: "designer"

mission: |
  你第一次进入 https://zao.live/。
  请以视觉设计师视角评估页面：首屏视觉是否建立产品气质，信息层级是否清楚，视觉节奏是否帮助理解，主要行动入口是否突出。
  请浏览首屏和后续模块，观察文案、图片、留白、模块重复、按钮权重和跳转反馈。
  如果看到主要入口，请基于视觉引导判断并尝试点击。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经判断首屏视觉、信息层级和主入口是否有效"
  - "已经观察到足够模块评估页面节奏和重复度"
  - "已经点击或确认主要行动入口"
  - "页面无法访问、核心内容无法加载，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏视觉和文案层级是否能建立清晰产品认知？"
    good: "品牌、主标题、解释文案和视觉主体共同表达产品定位。"
    bad: "视觉好看但信息抽象，用户无法从首屏理解产品用途。"

  - id: "primary_action"
    question: "主要行动入口在视觉层级中是否足够突出？"
    good: "主按钮权重高、位置清楚、文案明确，并与页面视觉动线一致。"
    bad: "按钮被视觉元素稀释，或与导航、图片、装饰元素竞争注意力。"

  - id: "scroll_discovery"
    question: "页面下滑后的视觉节奏是否形成有效信息递进？"
    good: "每一屏有明确主题，模块之间形成从价值到功能再到信任的节奏。"
    bad: "模块视觉相似、内容重复，滚动后缺少新的判断依据。"

  - id: "path_efficiency"
    question: "视觉引导是否减少理解和行动路径成本？"
    good: "用户能顺着视觉层级快速理解产品并进入下载或使用路径。"
    bad: "用户需要反复滚动或依赖猜测才能找到重点。"

  - id: "trust_and_confidence"
    question: "页面视觉是否支持专业感和可信度？"
    good: "设计质感、评价、官方渠道、开发者信息共同增强信任。"
    bad: "只有包装感，缺少可验证信任信号。"
