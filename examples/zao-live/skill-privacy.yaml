name: "zao.live 信任谨慎评测"
version: "1.0"
persona: "privacy_cautious"

mission: |
  你第一次进入 https://zao.live/。
  请以隐私谨慎用户视角浏览页面，重点判断这个 AI 个性化音频产品是否可信，是否有足够依据支持下载。
  请主动寻找评分、评价、开发者、官方渠道、隐私或安全相关信息。
  如果看到下载或应用商店入口，请点击并检查后续页面是否提供更多可信信息。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经找到足够信任信号，可以判断是否值得继续"
  - "已经点击主要入口并看到官方下载或应用详情页面"
  - "已经确认页面缺少信任信息，无法建立继续使用信心"
  - "页面无法访问、核心内容无法加载，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否清楚说明产品用途，避免让谨慎用户产生不确定感？"
    good: "首屏明确说明产品用途、使用方式和价值。"
    bad: "首屏表达抽象，用户无法判断产品是否涉及账号、推荐或数据使用。"

  - id: "primary_action"
    question: "主要入口是否让谨慎用户知道自己将去哪里？"
    good: "入口文案明确，点击后进入官方下载或可信详情页面。"
    bad: "入口含糊，用户无法预期跳转去向或后续动作。"

  - id: "scroll_discovery"
    question: "下滑后是否能发现更多可信依据？"
    good: "下滑后能看到评价、开发者、官方渠道、隐私或安全相关信息。"
    bad: "下滑后仍只有营销表达，没有可验证依据。"

  - id: "path_efficiency"
    question: "谨慎用户获取可信信息的路径是否高效？"
    good: "少量步骤内能看到可信信息并进入官方详情页。"
    bad: "可信信息隐藏太深，需要反复滚动或跳转才能确认。"

  - id: "trust_and_confidence"
    question: "页面是否提供足够信任信号支持下载？"
    good: "至少出现评分、评价、开发者、官方渠道、隐私或安全信息中的多类证据。"
    bad: "缺少评分、评价、开发者、隐私、安全或官方渠道信息。"
