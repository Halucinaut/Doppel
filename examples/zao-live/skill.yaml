name: "zao.live 体验评测"
version: "1.0"
persona: "newcomer"

mission: |
  你第一次进入 https://zao.live/。
  请像真实新用户一样浏览页面，尽量理解这个产品是什么、面向谁、核心价值是什么。
  请识别页面上的主要行动入口，并尝试判断下一步应该如何开始使用。
  如果首屏信息不足，请向下滚动查看后续内容；如果看到可继续探索的入口，请基于页面可见信息继续操作。
  不要编造页面上没有出现的信息；所有判断都必须来自你看到的页面内容和操作反馈。

stop_conditions:
  - "已经理解产品用途、目标用户和主要价值"
  - "已经识别主要行动入口，并知道下一步怎么开始"
  - "已经浏览到页面底部，仍无法判断产品用途或下一步行动"
  - "页面无法访问、核心内容无法加载，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否能让首次访问用户快速理解产品是什么？"
    good: "首屏能清楚表达产品定位、核心价值和面向对象。"
    bad: "首屏只呈现抽象口号或视觉元素，用户无法判断产品用途。"

  - id: "primary_action"
    question: "主要行动入口是否明显且容易理解？"
    good: "用户能快速找到开始使用、登录、注册、体验或了解更多的主要入口。"
    bad: "入口不明显、文案含糊，或多个入口之间优先级不清。"

  - id: "scroll_discovery"
    question: "向下浏览后，页面是否提供了足够的信息递进？"
    good: "下滑后能看到功能解释、使用场景、案例、流程或可信信息。"
    bad: "下滑后信息重复、断裂，或仍无法解释产品价值。"

  - id: "path_efficiency"
    question: "用户从进入页面到形成下一步判断的路径是否高效？"
    good: "用户无需大量试错即可形成清晰判断。"
    bad: "用户需要反复滚动、点击或猜测才能理解下一步。"

  - id: "trust_and_confidence"
    question: "页面是否提供足够的信任信号支持用户继续？"
    good: "页面提供清晰说明、产品细节、品牌背书、案例、隐私或安全相关信息。"
    bad: "页面缺少可信细节，用户难以判断是否值得登录或继续。"
