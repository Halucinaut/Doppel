name: "zao.live 新手理解评测"
version: "1.0"
persona: "newcomer"

mission: |
  你第一次进入 https://zao.live/。
  请像完全不了解早播和 AI 播客的新用户一样浏览页面。
  你的目标是判断：这个产品是什么、适合谁、解决什么问题、下一步应该点哪里。
  如果首屏看不懂，请继续下滑；如果看到明确入口，请尝试点击。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经理解产品用途、目标用户和主要价值"
  - "已经识别主要行动入口，并知道下一步怎么开始"
  - "已经浏览到页面底部，仍无法判断产品用途或下一步行动"
  - "页面无法访问、核心内容无法加载，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否能让纯新手快速理解产品是什么？"
    good: "首屏直接说明产品定位、使用场景和核心价值。"
    bad: "首屏只有口号或视觉元素，新手无法判断产品用途。"

  - id: "primary_action"
    question: "新手是否能找到明确的下一步行动入口？"
    good: "下载、开始使用或继续了解入口明显，文案没有歧义。"
    bad: "入口弱、入口过多或文案抽象，导致新手不知道点哪里。"

  - id: "scroll_discovery"
    question: "下滑后信息是否逐步补足新手理解？"
    good: "下滑后依次看到功能、场景、价值、信任信息。"
    bad: "下滑后内容重复，仍无法解释产品用途。"

  - id: "path_efficiency"
    question: "新手从进入到形成判断的路径是否高效？"
    good: "少量等待和滚动内完成理解并找到入口。"
    bad: "需要长时间等待、反复滚动或猜测才能理解。"

  - id: "trust_and_confidence"
    question: "页面是否给新手继续下载的信心？"
    good: "页面提供评分、评价、开发者、官方渠道或清晰产品细节。"
    bad: "缺少可信细节，新手难以判断是否值得下载。"
