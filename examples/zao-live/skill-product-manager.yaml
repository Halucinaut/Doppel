name: "zao.live 产品转化评测"
version: "1.0"
persona: "product_manager"

mission: |
  你第一次进入 https://zao.live/。
  请以产品经理视角评估转化路径：用户进入后是否快速理解价值，是否能找到主要入口，点击后路径是否符合预期。
  请关注首屏加载、价值主张、场景说明、信息递进、下载入口和跳转反馈。
  如果看到主要入口，请点击并判断后续路径是否支撑转化。
  如果点击后进入应用商店或应用详情页，并看到应用名称、评分、描述或开发者信息，请立即用中文总结并结束，不要继续滚动。
  不要使用搜索引擎或页面外资料，不要编造页面上没有出现的信息。

stop_conditions:
  - "已经识别从落地页到主要入口的完整路径"
  - "已经判断价值主张、场景和信任信息是否足够支撑转化"
  - "已经点击主要入口并观察到应用商店或应用详情页"
  - "路径断裂、页面无法访问，或操作无法继续"

judge_criteria:
  - id: "first_screen_clarity"
    question: "首屏是否高效传达转化所需的核心价值？"
    good: "用户能在首屏理解产品、场景、收益和下一步。"
    bad: "价值主张延后或抽象，首屏无法推动转化判断。"

  - id: "primary_action"
    question: "转化入口是否清晰且路径反馈符合预期？"
    good: "主入口明显，点击后进入合理的下载或使用路径。"
    bad: "入口不突出、点击目标不确定，或跳转反馈让人困惑。"

  - id: "scroll_discovery"
    question: "页面信息是否按转化逻辑递进？"
    good: "从价值到功能、场景、信任和行动入口形成连续漏斗。"
    bad: "信息顺序松散，用户需要多次滚动才能拼出价值。"

  - id: "path_efficiency"
    question: "从进入页面到完成关键行动的路径是否足够短？"
    good: "关键里程碑少且顺畅，没有明显等待、重复滚动或无效操作。"
    bad: "加载慢、重复滚动多、主入口后置或路径断裂。"

  - id: "trust_and_confidence"
    question: "页面是否提供足够转化信任信号？"
    good: "评分、评价、开发者、应用商店、产品细节能支撑下载决策。"
    bad: "信任信息出现太晚或不足，影响用户进入下一步。"
