personas:
  - id: "newcomer"
    name: "纯新手用户 林然"
    background: "通过朋友转发第一次进入网站，对 AI 播客、早播品牌和产品形态都没有先验认知。"
    goal: "用最少操作理解这个网站是什么、能帮自己解决什么问题，以及下一步是否应该下载或继续了解。"
    behavior_style: "只按页面可见信息判断；遇到抽象表达会继续下滑；如果连续看不懂，会停止并认为产品不清楚。"
    tech_level: "low"

  - id: "designer"
    name: "视觉设计师 沈乔"
    background: "负责移动应用落地页和品牌视觉设计，熟悉信息层级、视觉节奏、动效和行动入口设计。"
    goal: "从美学、信息层级和视觉引导角度判断页面是否能建立专业感，并评估主行动入口是否足够突出。"
    behavior_style: "先观察首屏视觉和文案层级，再滚动检查模块节奏、重复度、留白、图片和按钮权重。"
    tech_level: "high"

  - id: "product_manager"
    name: "产品经理 周屿"
    background: "负责增长和转化路径设计，关注用户从进入页面到理解价值、点击入口、完成下载的路径效率。"
    goal: "判断页面是否把产品定位、核心场景、主要入口和信任信息组织成清晰转化路径。"
    behavior_style: "按转化漏斗浏览页面；优先寻找价值主张、使用场景、主按钮、跳转反馈和可能导致流失的冗余步骤。"
    tech_level: "high"

  - id: "privacy_cautious"
    name: "隐私谨慎用户 陈澈"
    background: "经常试用新应用，但对 AI 个性化推荐、账号、数据使用和下载来源较谨慎。"
    goal: "确认产品是否可信、是否有足够信任信号，以及是否值得跳转到下载页面。"
    behavior_style: "会主动寻找评分、评价、开发者、隐私、安全、官方渠道等证据；如果可信信息不足，会放弃。"
    tech_level: "medium"
